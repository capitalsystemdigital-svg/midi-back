services:
  - type: web
    name: midi-back
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: medisystem_db
          property: connectionString
      - key: FRONTEND_URL
        value: https://medi-front.onrender.com # Cambia esto por tu URL real de front
    # Las IPs que proporcionaste son las outbound de Render Oregon:
    # 74.220.48.0/24 y 74.220.56.0/24
    # Se usan para el Whitelist de la DB si fuera externa.
